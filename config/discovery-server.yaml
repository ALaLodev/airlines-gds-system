server:
  port: 8761 # Este es el puerto donde vivirá Eureka

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false # Él es el servidor, no necesita registrarse a sí mismo
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/