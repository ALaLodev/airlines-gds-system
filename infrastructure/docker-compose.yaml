
services:
  # Base de datos centralizada (usaremos esquemas diferentes)
  mysql-db:
    image: mysql:8.0
    container_name: gds-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    networks:
      - gds-network

  # Motor de caché para vuelos y seguridad
  redis-cache:
    image: redis:alpine
    container_name: gds-redis
    ports:
      - "6379:6379"
    networks:
      - gds-network

networks:
  gds-network:
    driver: bridge